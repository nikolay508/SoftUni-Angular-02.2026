<div class="about">
    <h2>About us- {{companyName}}</h2>

    <p>Created the company {{foundYear}}</p>

    <div class="manager-info">
        <h3>Manager</h3>
        <p>Name: {{manager?.name}}</p>
        <p>Email: {{manager?.email}}</p>
    </div>

    @if (manager) {
        <p class="contact">
            Contact with me: {{manager.email}}
        </p>
    }
</div>
